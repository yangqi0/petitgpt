version: sft_mix_v4_1_simple_general_code

token_budget:
  target_train_tokens: 30000000
  val_ratio: 0.003
  min_val_tokens_per_source: 5000

mixture_by_token:
  A_general: 0.62
  B_code: 0.38

buckets:
  A_general:
    sources:
      - name: smol_smoltalk
        weight_in_bucket: 0.50
        max_rounds: 2
        max_assistant_tokens: 160
        max_examples: 25000

      - name: no_robots
        weight_in_bucket: 0.25
        max_rounds: 1
        max_assistant_tokens: 160
        max_examples: 8000
        allow_if_prompt_contains:
          - summarize
          - summary
          - rewrite
          - re-write
          - email
          - letter
          - explain
          - checklist
          - professional
          - formal
          - concise
          - clearer
          - python
          - csv
          - api

      - name: dolly_15k
        weight_in_bucket: 0.15
        max_rounds: 1
        max_assistant_tokens: 144
        max_examples: 10000

      - name: alpaca_cleaned
        weight_in_bucket: 0.10
        max_rounds: 1
        max_assistant_tokens: 128
        max_examples: 6000
        allow_if_prompt_contains:
          - rewrite
          - summarize
          - summary
          - email
          - professional
          - formal
          - polite
          - concise
          - clear
          - explain
          - difference between
          - what is
          - python
          - function
          - bug
          - csv
          - api
        ban_if_prompt_contains:
          - write a story
          - write a poem
          - write a paragraph
          - main character
          - fictional
          - instagram caption
          - traditional italian dish
          - describe a dish
          - scene

  B_code:
    sources:
      - name: mbpp_sanitized
        weight_in_bucket: 0.25
        require_ast_parse: true
        max_rounds: 1
        max_assistant_tokens: 192
        max_examples: 427

      - name: codealpaca_20k
        weight_in_bucket: 0.45
        require_ast_parse: true
        max_rounds: 1
        max_assistant_tokens: 224
        max_examples: 9000

      - name: viscode_200k
        weight_in_bucket: 0.30
        require_ast_parse: true
        max_rounds: 1
        max_assistant_tokens: 224
        max_examples: 7000

global_filters:
  drop_if_empty: true
  drop_if_too_short_chars: 16
  ban_tokens_in_assistant:
    - "###EOC###"
  max_total_tokens_per_example: 640
